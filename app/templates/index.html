<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProductPulse AI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="container py-5">

<h1 class="text-center mb-4">ProductPulse AI</h1>

<div class="card p-4 shadow">

<label class="form-label">Google Play URL 1</label>
<input id="app1-url" class="form-control mb-3">

<label class="form-label">Google Play URL 2</label>
<input id="app2-url" class="form-control mb-3">

<button id="compare-btn" class="btn btn-primary">
Compare Apps
</button>

</div>

<div id="loading-section" class="alert alert-info mt-4" style="display:none">
Analyzing...
</div>

<div id="results-section" style="display:none" class="mt-4">

<div class="card p-3 mb-3">
<h3>App 1</h3>
<p><b>Name:</b> <span id="app1-name"></span></p>
<p><b>Rating:</b> <span id="app1-rating"></span></p>
<p><b>Reviews:</b> <span id="app1-reviews"></span></p>
<h5>Pain Points</h5>
<ul id="app1-pain"></ul>
<h5>Feature Requests</h5>
<ul id="app1-features"></ul>
</div>

<div class="card p-3 mb-3">
<h3>App 2</h3>
<p><b>Name:</b> <span id="app2-name"></span></p>
<p><b>Rating:</b> <span id="app2-rating"></span></p>
<p><b>Reviews:</b> <span id="app2-reviews"></span></p>
<h5>Pain Points</h5>
<ul id="app2-pain"></ul>
<h5>Feature Requests</h5>
<ul id="app2-features"></ul>
</div>

<div class="card p-3 mb-3">
<h3>Winner</h3>
<h4 id="winner-name"></h4>
</div>

<div class="card p-3">
<h3>Executive Summary</h3>
<p id="summary"></p>
</div>

</div>

<script src="/static/js/app.js"></script>
</body>
</html>
